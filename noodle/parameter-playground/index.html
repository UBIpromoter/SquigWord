<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SquigWord Parameter Playground</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --card: #161619;
            --input: #1e1e22;
            --text: #ffffff;
            --dim: #9ca3af;
            --muted: #6b7280;
            --accent: #a855f7;
            --glow: rgba(168, 85, 247, 0.2);
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .app { max-width: 1920px; width: 100%; margin: 0 auto; padding: 16px 20px; }
        h1 {
            font-size: 13px; font-weight: 600; color: var(--muted);
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 14px;
        }
        h1 span { color: var(--accent); }

        /* === Three-canvas row === */
        .canvas-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }
        .canvas-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 6px;
            position: relative;
        }
        .canvas-card.playground-card {
            border-color: rgba(168, 85, 247, 0.3);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.08);
        }
        .canvas-label {
            position: absolute; top: 10px; left: 14px;
            font-size: 10px; font-weight: 600; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.5px; z-index: 1;
            background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 4px;
        }
        .canvas-label.accent { color: var(--accent); }
        .lock-badge {
            position: absolute; top: 10px; right: 14px;
            font-size: 9px; font-weight: 600; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.5px;
            background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 4px;
        }
        canvas {
            width: 100%; height: auto; display: block; border-radius: 6px;
            image-rendering: auto;
        }
        .canvas-info {
            font-size: 9px; color: var(--muted); padding: 4px 8px 2px;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.6;
            min-height: 28px;
        }
        .canvas-info span { color: var(--dim); }

        /* === Controls === */
        .controls {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 18px;
        }
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 16px;
        }
        .group-title {
            font-size: 10px; font-weight: 700; color: var(--accent);
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 10px;
            padding-bottom: 4px;
            border-bottom: 1px solid rgba(168, 85, 247, 0.2);
        }

        /* Top row: text/seed/type/spread */
        .top-controls {
            display: flex; gap: 12px; align-items: flex-end;
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .field { min-width: 0; }
        .field-label {
            display: block; font-size: 9px; font-weight: 600; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
        }
        input[type="text"], input[type="number"] {
            background: var(--input); border: 1px solid var(--border); border-radius: 6px;
            padding: 7px 10px; font-size: 14px; font-family: inherit; color: var(--text);
            outline: none; width: 100%;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
        input[type="number"] {
            width: 80px; font-family: 'JetBrains Mono', monospace;
            text-align: center; font-size: 12px;
        }

        .btn-row { display: flex; flex-wrap: wrap; gap: 4px; }
        .btn {
            padding: 5px 10px; border-radius: 5px; font-size: 11px; font-weight: 500;
            font-family: inherit; cursor: pointer;
            border: 1px solid var(--border); background: var(--input); color: var(--dim);
            transition: all 0.12s;
        }
        .btn:hover { background: var(--bg); color: var(--text); }
        .btn.active { background: var(--accent); border-color: var(--accent); color: white; }
        .icon-btn {
            width: 32px; height: 32px; border-radius: 6px;
            border: 1px solid var(--border); background: var(--card);
            color: var(--muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 14px;
            flex-shrink: 0;
        }
        .icon-btn:hover { background: var(--glow); border-color: var(--accent); color: var(--text); }

        /* Slider rows */
        .slider-row {
            display: flex; align-items: center; gap: 6px;
            margin-bottom: 7px;
        }
        .slider-row label {
            font-size: 9px; color: var(--dim); min-width: 0; flex: 0 0 auto;
            max-width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .slider-row input[type="range"] {
            flex: 1; height: 3px; -webkit-appearance: none; background: var(--border);
            border-radius: 2px; min-width: 60px;
        }
        .slider-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px;
            background: var(--accent); border-radius: 50%; cursor: pointer;
        }
        .slider-val {
            font-size: 10px; color: var(--text); min-width: 26px; text-align: right;
            font-family: 'JetBrains Mono', monospace; font-weight: 600;
        }
        .snow-ref {
            font-size: 8px; color: var(--muted); min-width: 42px; text-align: right;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Checkbox rows */
        .check-row {
            display: flex; align-items: center; gap: 6px;
            margin-bottom: 7px;
        }
        .check-row input[type="checkbox"] {
            accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer;
        }
        .check-row label {
            font-size: 9px; color: var(--dim); cursor: pointer;
        }
        .check-row .snow-ref {
            margin-left: auto;
        }

        /* Snowfro reference marker on sliders */
        .slider-wrap {
            flex: 1; position: relative; min-width: 60px;
        }
        .slider-wrap input[type="range"] {
            width: 100%; position: relative; z-index: 1;
        }
        .snow-tick {
            position: absolute; top: 0; width: 2px; height: 100%;
            background: #34d399; border-radius: 1px; z-index: 0;
            pointer-events: none; opacity: 0.7;
        }
        .snow-tick::after {
            content: 'S'; position: absolute; top: -10px; left: 50%;
            transform: translateX(-50%);
            font-size: 7px; font-weight: 700; color: #34d399;
            font-family: 'JetBrains Mono', monospace;
        }

        /* v2.4 current reference marker */
        .cur-tick {
            position: absolute; top: 0; width: 2px; height: 100%;
            background: #60a5fa; border-radius: 1px; z-index: 0;
            pointer-events: none; opacity: 0.7;
        }
        .cur-tick::after {
            content: 'C'; position: absolute; bottom: -10px; left: 50%;
            transform: translateX(-50%);
            font-size: 7px; font-weight: 700; color: #60a5fa;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Hidden slider rows */
        .slider-row.hidden, .check-row.hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="app">
    <h1>SquigWord <span>Parameter Playground</span></h1>

    <!-- Three canvases: Snowfro | Playground | Current -->
    <div class="canvas-row">
        <div class="canvas-card">
            <div class="canvas-label">Snowfro Reference</div>
            <div class="lock-badge">Locked</div>
            <canvas id="snowfroCanvas" width="600" height="300"></canvas>
            <div class="canvas-info" id="snowfroInfo"></div>
        </div>
        <div class="canvas-card playground-card">
            <div class="canvas-label accent">Playground</div>
            <canvas id="playCanvas" width="600" height="300"></canvas>
            <div class="canvas-info" id="playInfo"></div>
        </div>
        <div class="canvas-card">
            <div class="canvas-label">SquigWord v2.4</div>
            <div class="lock-badge">Locked</div>
            <canvas id="currentCanvas" width="600" height="300"></canvas>
            <div class="canvas-info" id="currentInfo"></div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <!-- Top row: type, text, seed, spread -->
        <div class="top-controls">
            <div class="field" style="flex: 0 0 auto;">
                <div class="field-label">Type</div>
                <div class="btn-row" id="typeBtns">
                    <button class="btn active" data-type="Normal">Normal</button>
                    <button class="btn" data-type="Bold">Bold</button>
                    <button class="btn" data-type="Slinky">Slinky</button>
                    <button class="btn" data-type="Pipe">Pipe</button>
                    <button class="btn" data-type="Fuzzy">Fuzzy</button>
                    <button class="btn" data-type="Ribbed">Ribbed</button>
                </div>
            </div>
            <div class="field" style="flex: 0 0 auto;">
                <div class="field-label">Background</div>
                <div class="btn-row" id="bgBtns">
                    <button class="btn active" data-bg="#000000">Black</button>
                    <button class="btn" data-bg="#ffffff">White</button>
                </div>
            </div>
            <div class="field" style="flex: 0 0 auto; align-self: flex-end;">
                <button class="btn" id="resetBtn" style="background: rgba(96,165,250,0.15); border-color: rgba(96,165,250,0.3); color: #60a5fa;">Reset to v2.4</button>
            </div>
            <div class="field" style="flex: 1;">
                <div class="field-label">Text</div>
                <div style="display:flex;gap:5px;">
                    <input type="text" id="textInput" value="Squiggles" maxlength="20" spellcheck="false">
                </div>
            </div>
            <div class="field" style="flex: 0 0 auto;">
                <div class="field-label">Seed</div>
                <div style="display:flex;gap:5px;">
                    <input type="number" id="seedInput" value="42">
                    <button class="icon-btn" id="randSeedBtn" title="Random seed">&#8635;</button>
                </div>
            </div>
            <div class="field" style="flex: 0 0 200px;">
                <div class="field-label">Spread</div>
                <div class="slider-row" style="margin-bottom:0;">
                    <input type="range" id="spreadSlider" min="1" max="50" value="15">
                    <span class="slider-val" id="spreadVal">15</span>
                </div>
            </div>
        </div>

        <!-- Slider groups -->
        <div class="controls-grid">
            <!-- Group 1: Circle Sizes -->
            <div>
                <div class="group-title">Circle Sizes (H/divisor)</div>
                <div class="slider-row" data-types="Normal,Ribbed">
                    <label>Normal</label>
                    <div class="slider-wrap" data-snow="13" data-cur="13" data-min="8" data-max="20">
                        <input type="range" id="normalDiv" min="8" max="20" value="13" step="1">
                    </div>
                    <span class="slider-val" id="normalDivVal">13</span>
                </div>
                <div class="slider-row" data-types="Bold">
                    <label>Bold</label>
                    <div class="slider-wrap" data-snow="5" data-cur="7" data-min="3" data-max="12">
                        <input type="range" id="boldDiv" min="3" max="12" value="7" step="1">
                    </div>
                    <span class="slider-val" id="boldDivVal">7</span>
                </div>
                <div class="slider-row" data-types="Pipe">
                    <label>Pipe outer</label>
                    <div class="slider-wrap" data-snow="7" data-cur="5" data-min="3" data-max="12">
                        <input type="range" id="pipeOuterDiv" min="3" max="12" value="5" step="1">
                    </div>
                    <span class="slider-val" id="pipeOuterDivVal">5</span>
                </div>
                <div class="slider-row" data-types="Slinky,Pipe">
                    <label>Inner ring</label>
                    <div class="slider-wrap" data-snow="13" data-cur="13" data-min="8" data-max="20">
                        <input type="range" id="pipeInnerDiv" min="8" max="20" value="13" step="1">
                    </div>
                    <span class="slider-val" id="pipeInnerDivVal">13</span>
                </div>
                <div class="slider-row" data-types="Ribbed">
                    <label>Ribbed</label>
                    <div class="slider-wrap" data-snow="12" data-cur="12" data-min="8" data-max="20">
                        <input type="range" id="ribbedDiv" min="8" max="20" value="12" step="1">
                    </div>
                    <span class="slider-val" id="ribbedDivVal">12</span>
                </div>
            </div>

            <!-- Group 2: Step Counts -->
            <div>
                <div class="group-title">Step Counts</div>
                <div class="slider-row" data-types="Normal,Ribbed">
                    <label>Normal</label>
                    <div class="slider-wrap" data-snow="200" data-cur="80" data-min="10" data-max="200">
                        <input type="range" id="normalSteps" min="10" max="200" value="80" step="1">
                    </div>
                    <span class="slider-val" id="normalStepsVal">80</span>
                </div>
                <div class="slider-row" data-types="Bold">
                    <label>Bold</label>
                    <div class="slider-wrap" data-snow="200" data-cur="50" data-min="10" data-max="200">
                        <input type="range" id="boldSteps" min="10" max="200" value="50" step="1">
                    </div>
                    <span class="slider-val" id="boldStepsVal">50</span>
                </div>
                <div class="slider-row" data-types="Slinky">
                    <label>Slinky</label>
                    <div class="slider-wrap" data-snow="50" data-cur="10" data-min="3" data-max="50">
                        <input type="range" id="slinkySteps" min="3" max="50" value="10" step="1">
                    </div>
                    <span class="slider-val" id="slinkyStepsVal">10</span>
                </div>
                <div class="slider-row" data-types="Pipe">
                    <label>Pipe</label>
                    <div class="slider-wrap" data-snow="50" data-cur="8" data-min="3" data-max="50">
                        <input type="range" id="pipeSteps" min="3" max="50" value="8" step="1">
                    </div>
                    <span class="slider-val" id="pipeStepsVal">8</span>
                </div>
            </div>

            <!-- Group 3: Stroke & Behavior -->
            <div>
                <div class="group-title">Stroke & Behavior</div>
                <div class="slider-row" data-types="Slinky,Pipe">
                    <label>Stroke wt</label>
                    <div class="slider-wrap" data-snow="1.0" data-cur="1.0" data-min="0.5" data-max="4.0">
                        <input type="range" id="swMult" min="0.5" max="4.0" value="1.0" step="0.1">
                    </div>
                    <span class="slider-val" id="swMultVal">1.0</span>
                </div>
                <div class="slider-row" data-types="Slinky,Pipe">
                    <label>Slinky sw</label>
                    <div class="slider-wrap" data-snow="1.0" data-cur="2.0" data-min="0.5" data-max="4.0">
                        <input type="range" id="slinkSwMult" min="0.5" max="4.0" value="2.0" step="0.1">
                    </div>
                    <span class="slider-val" id="slinkSwMultVal">2.0</span>
                </div>
                <div style="margin-top: 6px;">
                    <div class="check-row" data-types="Slinky,Pipe">
                        <input type="checkbox" id="fillJoins">
                        <label for="fillJoins">Fill at segment joins</label>
                        <span class="snow-ref">(S:ON)</span>
                    </div>
                    <div class="check-row" data-types="Slinky,Pipe">
                        <input type="checkbox" id="skipDouble" checked>
                        <label for="skipDouble">Skip double-draw</label>
                        <span class="snow-ref">(S:OFF)</span>
                    </div>
                </div>
            </div>

            <!-- Group 4: quick info -->
            <div>
                <div class="group-title">Derived Values (read-only)</div>
                <div id="derivedInfo" style="font-size: 10px; color: var(--dim); font-family: 'JetBrains Mono', monospace; line-height: 1.8;"></div>
            </div>
        </div>
    </div>
</div>

<script>
// ===========================================
// SHARED UTILITIES
// ===========================================

function curvePoint(p0, p1, p2, p3, t) {
    const t2 = t * t, t3 = t2 * t;
    return 0.5 * ((2 * p1) + (-p0 + p2) * t + (2 * p0 - 5 * p1 + 4 * p2 - p3) * t2 + (-p0 + 3 * p1 - 3 * p2 + p3) * t3);
}

function hsbToRgb(h, s, b) {
    const hue = ((h % 255) + 255) % 255 / 255;
    const sat = s / 255, bri = b / 255;
    let r, g, bl;
    const i = Math.floor(hue * 6), f = hue * 6 - i;
    const p = bri * (1 - sat), q = bri * (1 - f * sat), tv = bri * (1 - (1 - f) * sat);
    switch (i % 6) {
        case 0: r = bri; g = tv; bl = p; break;
        case 1: r = q; g = bri; bl = p; break;
        case 2: r = p; g = bri; bl = tv; break;
        case 3: r = p; g = q; bl = bri; break;
        case 4: r = tv; g = p; bl = bri; break;
        case 5: r = bri; g = p; bl = q; break;
    }
    return [Math.round(r * 255), Math.round(g * 255), Math.round(bl * 255)];
}

function map(value, inMin, inMax, outMin, outMax) {
    return outMin + (outMax - outMin) * ((value - inMin) / (inMax - inMin));
}

function generateDecPairs(seed) {
    let s = (Math.abs(seed) ^ 0xDEADBEEF) >>> 0;
    const pairs = [];
    for (let i = 0; i < 32; i++) {
        s ^= s << 13;
        s ^= s >>> 17;
        s ^= s << 5;
        s = s >>> 0;
        pairs.push(s % 256);
    }
    return pairs;
}

function createRng(seed) {
    let s = seed;
    return function rnd() {
        s ^= s << 13;
        s ^= s >> 17;
        s ^= s << 5;
        return (((s < 0) ? ~s + 1 : s) % 1000) / 1000;
    };
}

// ===========================================
// SVG PATH PARSER
// ===========================================

function parseSvgPath(d) {
    if (!d) return [];
    const strokes = [];
    let current = [];
    const tokens = d.trim().split(/\s+/);
    let i = 0;
    while (i < tokens.length) {
        const cmd = tokens[i];
        if (cmd === 'M') {
            if (current.length > 0) strokes.push(current);
            current = [[parseFloat(tokens[i+1]), parseFloat(tokens[i+2])]];
            i += 3;
        } else if (cmd === 'L') {
            current.push([parseFloat(tokens[i+1]), parseFloat(tokens[i+2])]);
            i += 3;
        } else if (cmd === 'C') {
            const prev = current[current.length - 1] || [0, 0];
            const x1 = parseFloat(tokens[i+1]), y1 = parseFloat(tokens[i+2]);
            const x2 = parseFloat(tokens[i+3]), y2 = parseFloat(tokens[i+4]);
            const x3 = parseFloat(tokens[i+5]), y3 = parseFloat(tokens[i+6]);
            for (let t = 1; t <= 8; t++) {
                const u = t / 8, v = 1 - u;
                current.push([
                    v*v*v*prev[0] + 3*v*v*u*x1 + 3*v*u*u*x2 + u*u*u*x3,
                    v*v*v*prev[1] + 3*v*v*u*y1 + 3*v*u*u*y2 + u*u*u*y3
                ]);
            }
            i += 7;
        } else {
            i++;
        }
    }
    if (current.length > 0) strokes.push(current);
    return strokes;
}

// Pre-parse all glyphs
const FONT = {};
for (const [char, data] of Object.entries(EMS_ALLURE)) {
    FONT[char] = {
        width: data.w,
        strokes: parseSvgPath(data.d || '')
    };
}

// Stroke classification for EMS Allure coordinate scale
function isDot(stroke) {
    if (stroke.length > 3) return false;
    let len = 0;
    for (let i = 0; i < stroke.length - 1; i++) {
        const dx = stroke[i+1][0] - stroke[i][0], dy = stroke[i+1][1] - stroke[i][1];
        len += Math.sqrt(dx*dx + dy*dy);
    }
    return len < 120;
}

function isCrossbar(stroke) {
    if (stroke.length < 2 || stroke.length > 3) return false;
    const dx = Math.abs(stroke[stroke.length-1][0] - stroke[0][0]);
    const dy = Math.abs(stroke[stroke.length-1][1] - stroke[0][1]);
    return dx > dy * 3 && dx > 100;
}

// ===========================================
// BUILD WORD PATHS (exact copy from v2.4)
// ===========================================

function buildWordPaths(text, type, canvasWidth, canvasHeight, decPairs) {
    const primaryPaths = [];
    const secondaryPaths = [];

    const boldSpacingFactor = (type === 'Bold' || type === 'Pipe') ? 0.3 : 0;
    let totalFontWidth = 0;
    for (const char of text) {
        const glyph = FONT[char];
        if (!glyph) continue;
        totalFontWidth += glyph.width * (1 + boldSpacingFactor);
    }
    if (totalFontWidth <= 0) return { primary: [], secondary: [], letterHeight: 0 };

    const maxWidth = canvasWidth * 0.75;
    const maxHeightScale = (canvasHeight * 0.65) / 900;
    const scale = Math.min(maxWidth / totalFontWidth, maxHeightScale);

    const baselineY = canvasHeight * 0.55;
    let xOffset = (canvasWidth - totalFontWidth * scale) / 2;

    let minY = Infinity, maxY = -Infinity;
    let letterIdx = 0;

    for (const char of text) {
        const glyph = FONT[char];
        if (!glyph) continue;

        if (char === ' ') {
            xOffset += glyph.width * scale;
            continue;
        }

        const yWobble = decPairs ? map(decPairs[letterIdx % 10], 0, 255, -4, 4) * scale : 0;
        const rotation = decPairs ? map(decPairs[10 + (letterIdx % 10)], 0, 255, -0.03, 0.03) : 0;
        const scaleVar = decPairs ? map(decPairs[20 + (letterIdx % 2)], 0, 255, 0.97, 1.03) : 1;

        const letterCenterX = xOffset + (glyph.width / 2) * scale;
        const letterCenterY = baselineY - 150 * scale;

        const isCapital = char >= 'A' && char <= 'Z';
        const isThinMode = type === 'Slinky' || type === 'Pipe';

        let longestIdx = 0, maxLen = 0;
        glyph.strokes.forEach((s, idx) => {
            if (s.length > maxLen) { maxLen = s.length; longestIdx = idx; }
        });

        const cosR = Math.cos(rotation), sinR = Math.sin(rotation);

        for (let si = 0; si < glyph.strokes.length; si++) {
            const stroke = glyph.strokes[si];
            const isSecondary = isThinMode ? false
                : (isDot(stroke) || isCrossbar(stroke));

            const transformedPath = stroke.map(([fx, fy]) => {
                let cx = xOffset + fx * scale;
                let cy = baselineY - fy * scale;
                let dx = cx - letterCenterX, dy = cy - letterCenterY;
                dx *= scaleVar; dy *= scaleVar;
                const rx = dx * cosR - dy * sinR;
                const ry = dx * sinR + dy * cosR;
                cx = letterCenterX + rx;
                cy = letterCenterY + ry + yWobble;
                if (!isSecondary) {
                    minY = Math.min(minY, cy);
                    maxY = Math.max(maxY, cy);
                }
                return [cx, cy];
            });

            if (isSecondary) {
                secondaryPaths.push(transformedPath);
            } else {
                primaryPaths.push(transformedPath);
            }
        }
        const boldExtra = (type === 'Bold' || type === 'Pipe') ? glyph.width * 0.3 : 0;
        xOffset += (glyph.width + boldExtra) * scale;
        letterIdx++;
    }

    const letterHeight = (maxY - minY) || canvasHeight * 0.4;
    return { primary: primaryPaths, secondary: secondaryPaths, letterHeight };
}

// ===========================================
// CANVAS 1: SNOWFRO REFERENCE (locked)
// ===========================================

function renderSnowfro(canvas) {
    const ctx = canvas.getContext('2d');
    const width = canvas.width, height = canvas.height;
    const type = state.type;
    const spread = state.spread;
    const decPairs = generateDecPairs(state.seed);

    const startColor = decPairs[29];
    const reverse = decPairs[30] < 128;
    const isSlinky = type === 'Slinky' || type === 'Pipe';
    const isPipe = type === 'Pipe';
    const isBold = type === 'Bold';
    const isSegmented = type === 'Ribbed';
    const isFuzzy = type === 'Fuzzy';

    const segments = Math.floor(map(decPairs[26], 0, 255, 12, 20));
    const ht = map(decPairs[27], 0, 255, 3, 4);
    const wt = 2, amp = 1;
    const sw = height / 1200;

    const div = Math.floor(map(Math.round(decPairs[24]), 0, 230, 3, 20));
    const ribbedSteps = Math.round(200 * Math.max(1, div / 5));
    const steps = isSlinky ? 50 : isFuzzy ? 1000 : isSegmented ? ribbedSteps : 200;

    ctx.fillStyle = state.bg;
    ctx.fillRect(0, 0, width, height);
    ctx.lineWidth = sw;

    const rngBaseSeed = (Math.abs(state.seed) ^ 0xDEADBEEF) >>> 0;
    let rng = createRng(rngBaseSeed);
    const offsetX = (width / 2) - (width / wt / 2);
    const offsetY = height / 2;
    let color = 0;

    for (let j = 0; j < segments - 2; j++) {
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const x = curvePoint(
                width / segments / wt * j,
                width / segments / wt * (j + 1),
                width / segments / wt * (j + 2),
                width / segments / wt * (j + 3),
                t
            ) + offsetX;

            const y = curvePoint(
                map(decPairs[j], 0, 255, -height / ht, height / ht) * amp,
                map(decPairs[j + 1], 0, 255, -height / ht, height / ht) * amp,
                map(decPairs[j + 2], 0, 255, -height / ht, height / ht) * amp,
                map(decPairs[j + 3], 0, 255, -height / ht, height / ht) * amp,
                t
            ) + offsetY;

            const hue = reverse
                ? 255 - (((color / spread) + startColor) % 255)
                : (((color / spread) + startColor) % 255);
            const [r, g, b] = hsbToRgb(hue, 255, 255);

            if (isFuzzy) {
                const fuzzX = x + map(rng(), 0, 1, 0, height / 10);
                const fuzzY = y + map(rng(), 0, 1, 0, height / 10);
                const dist = Math.sqrt((x - fuzzX) ** 2 + (y - fuzzY) ** 2);
                if (dist < height / 11.5) {
                    const ps = map(rng(), 0, 1, height / 160, height / 16);
                    ctx.beginPath(); ctx.arc(fuzzX, fuzzY, ps / 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${r},${g},${b},${20/255})`; ctx.fill();
                }
            } else {
                if (isSlinky && isPipe) {
                    ctx.beginPath(); ctx.arc(x, y, (height / 7) / 2, 0, Math.PI * 2);
                    if (i === 0 || i === steps - 1) { ctx.fillStyle = 'black'; ctx.fill(); }
                    ctx.strokeStyle = 'black'; ctx.lineWidth = sw; ctx.stroke();
                }
                if (isSlinky) {
                    ctx.beginPath(); ctx.arc(x, y, (height / 13) / 2, 0, Math.PI * 2);
                    if (i === 0 || i === steps - 1) { ctx.fillStyle = `rgb(${r},${g},${b})`; ctx.fill(); }
                    ctx.strokeStyle = `rgb(${r},${g},${b})`; ctx.lineWidth = sw; ctx.stroke();
                } else {
                    const diam = isBold ? height / 5 : height / 13;
                    ctx.beginPath(); ctx.arc(x, y, diam / 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgb(${r},${g},${b})`; ctx.fill();
                }
                if (isSegmented && !isSlinky && !isBold) {
                    if (i % div === 0 || i === 0 || i === steps - 1) {
                        ctx.beginPath(); ctx.arc(x, y, (height / 12) / 2, 0, Math.PI * 2);
                        ctx.fillStyle = `rgb(${decPairs[25]},${decPairs[25]},${decPairs[25]})`; ctx.fill();
                    }
                }
            }
            color++;
        }
        rng = createRng(rngBaseSeed);
    }

    // Info label
    document.getElementById('snowfroInfo').innerHTML =
        `steps: <span>${steps}</span> | sw: <span>${sw.toFixed(2)}</span> | ` +
        `normal: <span>H/${13}</span> | bold: <span>H/${5}</span> | ` +
        `pipe: <span>H/${7}</span> | inner: <span>H/${13}</span>`;
}

// ===========================================
// CANVAS 2: SQUIGWORD CURRENT v2.4 (locked)
// ===========================================

function computeDrawOpsCurrent(canvas) {
    const width = canvas.width;
    const height = canvas.height;
    const particles = [];

    if (!state.text.trim()) return { particles, info: {} };

    const { type, spread } = state;
    const decPairs = generateDecPairs(state.seed);
    const startColor = decPairs[29];
    const reverse = decPairs[30] < 128;

    const isSlinky = type === 'Slinky' || type === 'Pipe';
    const isPipe = type === 'Pipe';
    const isBold = type === 'Bold';
    const isSegmented = type === 'Ribbed';
    const isFuzzy = type === 'Fuzzy';

    const { primary, secondary, letterHeight } = buildWordPaths(state.text, type, width, height, decPairs);
    const allPaths = [...primary, ...secondary];
    if (allPaths.length === 0) return { particles, info: {} };

    const effectiveH = letterHeight / 0.57;
    const normalDiam = effectiveH / 13;
    const boldDiam = effectiveH / 7;
    const slinkyRingDiam = normalDiam;
    const pipeDiam = effectiveH / 5;
    const ribbedDiam = effectiveH / 12;
    const sw = effectiveH / 1200;

    const div = Math.floor(map(Math.round(decPairs[24]), 0, 230, 3, 20));
    const ribbedSteps = Math.round(80 * Math.max(1, div / 5));
    const steps = isPipe ? 8 : isSlinky ? 10 : isFuzzy ? 200 : isBold ? 50 : isSegmented ? ribbedSteps : 80;

    const rngBaseSeed = (Math.abs(state.seed) ^ 0xDEADBEEF) >>> 0;
    let rng = createRng(rngBaseSeed);

    const slinkySw = Math.max(sw * 2, 1.0);
    const slinkyDiam = normalDiam;

    let color = 0;

    for (const pathPoints of allPaths) {
        if (pathPoints.length < 2) continue;
        const padded = [pathPoints[0], ...pathPoints, pathPoints[pathPoints.length - 1]];
        const totalSegs = padded.length - 3;

        for (let seg = 0; seg < totalSegs; seg++) {
            const [p0, p1, p2, p3] = [padded[seg], padded[seg + 1], padded[seg + 2], padded[seg + 3]];
            const lastSeg = seg === totalSegs - 1;

            for (let i = 0; i <= steps; i++) {
                // v2.4: skip last point of each segment except final (dedup fix)
                if (i === steps && !lastSeg) continue;
                const t = i / steps;
                const x = curvePoint(p0[0], p1[0], p2[0], p3[0], t);
                const y = curvePoint(p0[1], p1[1], p2[1], p3[1], t);
                const isEndpoint = (seg === 0 && i === 0) || (lastSeg && i === steps);

                const hue = reverse
                    ? 255 - (((color / spread) + startColor) % 255)
                    : (((color / spread) + startColor) % 255);
                const [r, g, b] = hsbToRgb(hue, 255, 255);

                const ops = [];

                if (isFuzzy) {
                    const fuzzR = effectiveH / 13;
                    const fuzzX = x + map(rng(), 0, 1, 0, fuzzR);
                    const fuzzY = y + map(rng(), 0, 1, 0, fuzzR);
                    const dist = Math.sqrt((x - fuzzX) ** 2 + (y - fuzzY) ** 2);
                    if (dist < fuzzR * 1.1) {
                        const particleSize = map(rng(), 0, 1, effectiveH / 100, effectiveH / 20);
                        ops.push({ x: fuzzX, y: fuzzY, radius: particleSize / 2,
                            fill: `rgba(${r},${g},${b},${20/255})` });
                    }
                } else if (isSlinky) {
                    if (isPipe) {
                        ops.push({ x, y, radius: pipeDiam / 2,
                            fill: isEndpoint ? 'black' : null,
                            stroke: 'black', lineWidth: sw + (slinkySw - sw) * 0.3 });
                        ops.push({ x, y, radius: slinkyDiam / 2,
                            fill: isEndpoint ? `rgb(${r},${g},${b})` : null,
                            stroke: `rgb(${r},${g},${b})`, lineWidth: slinkySw });
                    } else {
                        ops.push({ x, y, radius: slinkyDiam / 2,
                            fill: isEndpoint ? `rgb(${r},${g},${b})` : null,
                            stroke: `rgb(${r},${g},${b})`, lineWidth: slinkySw });
                    }
                } else if (isSegmented) {
                    ops.push({ x, y, radius: normalDiam / 2,
                        fill: `rgb(${r},${g},${b})` });
                    if (i % div === 0 || i === 0 || i === steps - 1) {
                        ops.push({ x, y, radius: ribbedDiam / 2,
                            fill: `rgb(${decPairs[25]},${decPairs[25]},${decPairs[25]})` });
                    }
                } else {
                    const diam = isBold ? boldDiam : normalDiam;
                    ops.push({ x, y, radius: diam / 2,
                        fill: `rgb(${r},${g},${b})` });
                }

                if (ops.length > 0) particles.push(ops);
                color++;
            }
        }
        rng = createRng(rngBaseSeed);
    }

    return {
        particles,
        info: { steps, sw, effectiveH, normalDiam, boldDiam, pipeDiam, slinkyDiam, ribbedDiam, slinkySw }
    };
}

function renderCurrent(canvas) {
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = state.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const { particles, info } = computeDrawOpsCurrent(canvas);
    for (let i = 0; i < particles.length; i++) {
        for (const op of particles[i]) {
            ctx.beginPath();
            ctx.arc(op.x, op.y, op.radius, 0, Math.PI * 2);
            if (op.fill) { ctx.fillStyle = op.fill; ctx.fill(); }
            if (op.stroke) { ctx.strokeStyle = op.stroke; ctx.lineWidth = op.lineWidth; ctx.stroke(); }
        }
    }

    if (info.steps !== undefined) {
        document.getElementById('currentInfo').innerHTML =
            `steps: <span>${info.steps}</span> | sw: <span>${info.sw.toFixed(2)}</span> | ` +
            `normal: <span>H/${13}</span> | bold: <span>H/${7}</span> | ` +
            `pipe: <span>H/${5}</span> | inner: <span>H/${13}</span> | ` +
            `skipDup: <span>ON</span> | fillJoins: <span>OFF</span>`;
    } else {
        document.getElementById('currentInfo').innerHTML = '';
    }
}

// ===========================================
// CANVAS 3: PLAYGROUND (slider-driven)
// ===========================================

function getSliders() {
    return {
        normalDiv: parseInt(document.getElementById('normalDiv').value),
        boldDiv: parseInt(document.getElementById('boldDiv').value),
        pipeOuterDiv: parseInt(document.getElementById('pipeOuterDiv').value),
        pipeInnerDiv: parseInt(document.getElementById('pipeInnerDiv').value),
        ribbedDiv: parseInt(document.getElementById('ribbedDiv').value),
        normalSteps: parseInt(document.getElementById('normalSteps').value),
        boldSteps: parseInt(document.getElementById('boldSteps').value),
        slinkySteps: parseInt(document.getElementById('slinkySteps').value),
        pipeSteps: parseInt(document.getElementById('pipeSteps').value),
        swMult: parseFloat(document.getElementById('swMult').value),
        slinkSwMult: parseFloat(document.getElementById('slinkSwMult').value),
        fillJoins: document.getElementById('fillJoins').checked,
        skipDouble: document.getElementById('skipDouble').checked
    };
}

function computeDrawOpsPlayground(canvas, sliders) {
    const width = canvas.width;
    const height = canvas.height;
    const particles = [];

    if (!state.text.trim()) return { particles, info: {} };

    const { type, spread } = state;
    const decPairs = generateDecPairs(state.seed);
    const startColor = decPairs[29];
    const reverse = decPairs[30] < 128;

    const isSlinky = type === 'Slinky' || type === 'Pipe';
    const isPipe = type === 'Pipe';
    const isBold = type === 'Bold';
    const isSegmented = type === 'Ribbed';
    const isFuzzy = type === 'Fuzzy';

    const { primary, secondary, letterHeight } = buildWordPaths(state.text, type, width, height, decPairs);
    const allPaths = [...primary, ...secondary];
    if (allPaths.length === 0) return { particles, info: {} };

    const effectiveH = letterHeight / 0.57;

    // PLAYGROUND: all sizing from sliders
    const normalDiam = effectiveH / sliders.normalDiv;
    const boldDiam = effectiveH / sliders.boldDiv;
    const pipeDiam = effectiveH / sliders.pipeOuterDiv;
    const slinkyDiam = effectiveH / sliders.pipeInnerDiv;
    const ribbedDiam = effectiveH / sliders.ribbedDiv;
    const sw = effectiveH / 1200 * sliders.swMult;
    const slinkySw = Math.max(effectiveH / 1200 * sliders.slinkSwMult, 0.5);

    const div = Math.floor(map(Math.round(decPairs[24]), 0, 230, 3, 20));
    const ribbedSteps = Math.round(sliders.normalSteps * Math.max(1, div / 5));
    const steps = isPipe ? sliders.pipeSteps : isSlinky ? sliders.slinkySteps : isFuzzy ? 200 : isBold ? sliders.boldSteps : isSegmented ? ribbedSteps : sliders.normalSteps;

    const rngBaseSeed = (Math.abs(state.seed) ^ 0xDEADBEEF) >>> 0;
    let rng = createRng(rngBaseSeed);

    let color = 0;

    for (const pathPoints of allPaths) {
        if (pathPoints.length < 2) continue;
        const padded = [pathPoints[0], ...pathPoints, pathPoints[pathPoints.length - 1]];
        const totalSegs = padded.length - 3;

        for (let seg = 0; seg < totalSegs; seg++) {
            const [p0, p1, p2, p3] = [padded[seg], padded[seg + 1], padded[seg + 2], padded[seg + 3]];
            const lastSeg = seg === totalSegs - 1;

            for (let i = 0; i <= steps; i++) {
                // skipDouble: skip last point of each segment except final
                if (sliders.skipDouble && i === steps && !lastSeg) continue;

                const t = i / steps;
                const x = curvePoint(p0[0], p1[0], p2[0], p3[0], t);
                const y = curvePoint(p0[1], p1[1], p2[1], p3[1], t);

                // fillJoins: whether segment boundary points get filled
                const isEndpoint = (seg === 0 && i === 0) || (lastSeg && i === steps);
                const isSegBoundary = (i === 0 || i === steps);
                const shouldFill = sliders.fillJoins ? isSegBoundary : isEndpoint;

                const hue = reverse
                    ? 255 - (((color / spread) + startColor) % 255)
                    : (((color / spread) + startColor) % 255);
                const [r, g, b] = hsbToRgb(hue, 255, 255);

                const ops = [];

                if (isFuzzy) {
                    const fuzzR = effectiveH / 13;
                    const fuzzX = x + map(rng(), 0, 1, 0, fuzzR);
                    const fuzzY = y + map(rng(), 0, 1, 0, fuzzR);
                    const dist = Math.sqrt((x - fuzzX) ** 2 + (y - fuzzY) ** 2);
                    if (dist < fuzzR * 1.1) {
                        const particleSize = map(rng(), 0, 1, effectiveH / 100, effectiveH / 20);
                        ops.push({ x: fuzzX, y: fuzzY, radius: particleSize / 2,
                            fill: `rgba(${r},${g},${b},${20/255})` });
                    }
                } else if (isSlinky) {
                    if (isPipe) {
                        ops.push({ x, y, radius: pipeDiam / 2,
                            fill: shouldFill ? 'black' : null,
                            stroke: 'black', lineWidth: sw + (slinkySw - sw) * 0.3 });
                        ops.push({ x, y, radius: slinkyDiam / 2,
                            fill: shouldFill ? `rgb(${r},${g},${b})` : null,
                            stroke: `rgb(${r},${g},${b})`, lineWidth: slinkySw });
                    } else {
                        ops.push({ x, y, radius: slinkyDiam / 2,
                            fill: shouldFill ? `rgb(${r},${g},${b})` : null,
                            stroke: `rgb(${r},${g},${b})`, lineWidth: slinkySw });
                    }
                } else if (isSegmented) {
                    ops.push({ x, y, radius: normalDiam / 2,
                        fill: `rgb(${r},${g},${b})` });
                    if (i % div === 0 || i === 0 || i === steps - 1) {
                        ops.push({ x, y, radius: ribbedDiam / 2,
                            fill: `rgb(${decPairs[25]},${decPairs[25]},${decPairs[25]})` });
                    }
                } else {
                    const diam = isBold ? boldDiam : normalDiam;
                    ops.push({ x, y, radius: diam / 2,
                        fill: `rgb(${r},${g},${b})` });
                }

                if (ops.length > 0) particles.push(ops);
                color++;
            }
        }
        rng = createRng(rngBaseSeed);
    }

    return {
        particles,
        info: { steps, sw, effectiveH, normalDiam, boldDiam, pipeDiam, slinkyDiam, ribbedDiam, slinkySw }
    };
}

function renderPlayground(canvas) {
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = state.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const sliders = getSliders();
    const { particles, info } = computeDrawOpsPlayground(canvas, sliders);

    for (let i = 0; i < particles.length; i++) {
        for (const op of particles[i]) {
            ctx.beginPath();
            ctx.arc(op.x, op.y, op.radius, 0, Math.PI * 2);
            if (op.fill) { ctx.fillStyle = op.fill; ctx.fill(); }
            if (op.stroke) { ctx.strokeStyle = op.stroke; ctx.lineWidth = op.lineWidth; ctx.stroke(); }
        }
    }

    if (info.steps !== undefined) {
        document.getElementById('playInfo').innerHTML =
            `steps: <span>${info.steps}</span> | sw: <span>${info.sw.toFixed(2)}</span> | ` +
            `normal: <span>H/${sliders.normalDiv}</span> | bold: <span>H/${sliders.boldDiv}</span> | ` +
            `pipe: <span>H/${sliders.pipeOuterDiv}</span> | inner: <span>H/${sliders.pipeInnerDiv}</span> | ` +
            `skipDup: <span>${sliders.skipDouble ? 'ON' : 'OFF'}</span> | fillJoins: <span>${sliders.fillJoins ? 'ON' : 'OFF'}</span>`;

        // Update derived values panel
        document.getElementById('derivedInfo').innerHTML =
            `effectiveH: ${info.effectiveH.toFixed(1)}<br>` +
            `normalDiam: ${info.normalDiam.toFixed(2)}<br>` +
            `boldDiam: ${info.boldDiam.toFixed(2)}<br>` +
            `pipeDiam: ${info.pipeDiam.toFixed(2)}<br>` +
            `slinkyDiam: ${info.slinkyDiam.toFixed(2)}<br>` +
            `ribbedDiam: ${info.ribbedDiam.toFixed(2)}<br>` +
            `sw: ${info.sw.toFixed(3)}<br>` +
            `slinkySw: ${info.slinkySw.toFixed(3)}<br>` +
            `particles: ${particles.length}`;
    } else {
        document.getElementById('playInfo').innerHTML = '';
        document.getElementById('derivedInfo').innerHTML = '';
    }
}

// ===========================================
// RENDER ALL
// ===========================================

function renderAll() {
    const snowCanvas = document.getElementById('snowfroCanvas');
    const curCanvas = document.getElementById('currentCanvas');
    const playCanvas = document.getElementById('playCanvas');

    renderSnowfro(snowCanvas);
    renderCurrent(curCanvas);
    renderPlayground(playCanvas);
}

// Only re-render playground on slider changes
function renderPlaygroundOnly() {
    renderPlayground(document.getElementById('playCanvas'));
}

// ===========================================
// EVENT HANDLERS
// ===========================================

// Text input
document.getElementById('textInput').addEventListener('input', (e) => {
    state.text = e.target.value;
    renderAll();
});

// Seed input
document.getElementById('seedInput').addEventListener('input', (e) => {
    state.seed = parseInt(e.target.value) || 0;
    renderAll();
});

// Random seed
document.getElementById('randSeedBtn').addEventListener('click', () => {
    state.seed = Math.floor(Math.random() * 10000);
    document.getElementById('seedInput').value = state.seed;
    renderAll();
});

// Type buttons
document.querySelectorAll('#typeBtns .btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('#typeBtns .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.type = btn.dataset.type;
        updateSliderVisibility();
        renderAll();
    });
});

// Spread slider
document.getElementById('spreadSlider').addEventListener('input', (e) => {
    state.spread = parseInt(e.target.value);
    document.getElementById('spreadVal').textContent = state.spread;
    renderAll();
});

// All playground sliders — update value display and re-render playground only
const sliderConfigs = [
    { id: 'normalDiv', valId: 'normalDivVal' },
    { id: 'boldDiv', valId: 'boldDivVal' },
    { id: 'pipeOuterDiv', valId: 'pipeOuterDivVal' },
    { id: 'pipeInnerDiv', valId: 'pipeInnerDivVal' },
    { id: 'ribbedDiv', valId: 'ribbedDivVal' },
    { id: 'normalSteps', valId: 'normalStepsVal' },
    { id: 'boldSteps', valId: 'boldStepsVal' },
    { id: 'slinkySteps', valId: 'slinkyStepsVal' },
    { id: 'pipeSteps', valId: 'pipeStepsVal' },
    { id: 'swMult', valId: 'swMultVal' },
    { id: 'slinkSwMult', valId: 'slinkSwMultVal' }
];

sliderConfigs.forEach(({ id, valId }) => {
    document.getElementById(id).addEventListener('input', (e) => {
        const val = e.target.value;
        document.getElementById(valId).textContent = val;
        renderPlaygroundOnly();
    });
});

// Checkboxes
document.getElementById('fillJoins').addEventListener('change', renderPlaygroundOnly);
document.getElementById('skipDouble').addEventListener('change', renderPlaygroundOnly);

// Reset to v2.4 defaults
document.getElementById('resetBtn').addEventListener('click', () => {
    const defaults = {
        normalDiv: 13, boldDiv: 7, pipeOuterDiv: 5, pipeInnerDiv: 13, ribbedDiv: 12,
        normalSteps: 80, boldSteps: 50, slinkySteps: 10, pipeSteps: 8,
        swMult: 1.0, slinkSwMult: 2.0
    };
    for (const [id, val] of Object.entries(defaults)) {
        const el = document.getElementById(id);
        el.value = val;
        const valEl = document.getElementById(id + 'Val');
        if (valEl) valEl.textContent = val;
    }
    document.getElementById('fillJoins').checked = false;
    document.getElementById('skipDouble').checked = true;
    renderPlaygroundOnly();
});

// Background toggle
document.querySelectorAll('#bgBtns .btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('#bgBtns .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.bg = btn.dataset.bg;
        renderAll();
    });
});

// ===========================================
// SNOWFRO REFERENCE TICKS ON SLIDERS
// ===========================================
function placeSnowTicks() {
    document.querySelectorAll('.slider-wrap').forEach(wrap => {
        // Remove existing ticks
        wrap.querySelectorAll('.snow-tick, .cur-tick').forEach(t => t.remove());

        const min = parseFloat(wrap.dataset.min);
        const max = parseFloat(wrap.dataset.max);

        // Snowfro tick (green, "S" label above)
        const snowVal = parseFloat(wrap.dataset.snow);
        const snowPct = ((snowVal - min) / (max - min)) * 100;
        const snowTick = document.createElement('div');
        snowTick.className = 'snow-tick';
        snowTick.style.left = `calc(${snowPct}% - 1px)`;
        wrap.appendChild(snowTick);

        // v2.4 current tick (blue, "C" label below)
        if (wrap.dataset.cur) {
            const curVal = parseFloat(wrap.dataset.cur);
            const curPct = ((curVal - min) / (max - min)) * 100;
            const curTick = document.createElement('div');
            curTick.className = 'cur-tick';
            curTick.style.left = `calc(${curPct}% - 1px)`;
            wrap.appendChild(curTick);
        }
    });
}

// ===========================================
// TYPE-AWARE SLIDER VISIBILITY
// ===========================================
function updateSliderVisibility() {
    const type = state.type;
    document.querySelectorAll('.slider-row[data-types], .check-row[data-types]').forEach(row => {
        const types = row.dataset.types.split(',');
        if (types.includes(type)) {
            row.classList.remove('hidden');
        } else {
            row.classList.add('hidden');
        }
    });
}

// ===========================================
// INITIAL RENDER
// ===========================================
placeSnowTicks();
updateSliderVisibility();
renderAll();
</script>
