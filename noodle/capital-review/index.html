<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Script Capital — Stroke Picker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: system-ui, sans-serif; padding: 20px; }
        h1 { font-size: 16px; color: #888; margin-bottom: 4px; }
        .subtitle { font-size: 12px; color: #555; margin-bottom: 16px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 12px; }
        .cell {
            background: #111; border: 1px solid #222; border-radius: 8px; padding: 10px;
            display: flex; gap: 10px; align-items: flex-start;
        }
        .canvases { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
        .canvases canvas { border-radius: 4px; display: block; }
        .info { flex: 1; min-width: 0; }
        .letter-head { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
        .letter-head .status { font-size: 11px; font-weight: 500; margin-left: 6px; }
        .status-done { color: #34d399; }
        .status-needs { color: #f59e0b; }
        .stroke-toggles { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
        .stroke-btn {
            width: 32px; height: 28px; border-radius: 4px; border: 2px solid;
            font-size: 12px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
            cursor: pointer; transition: all 0.1s; display: flex; align-items: center; justify-content: center;
        }
        .stroke-btn.on { opacity: 1; }
        .stroke-btn.off { opacity: 0.25; border-style: dashed; }
        .stroke-btn:hover { transform: scale(1.1); }
        .pick-line { font-size: 11px; color: #555; font-family: 'JetBrains Mono', monospace; margin-top: 4px; }
        .pick-line .indices { color: #a855f7; }
        .match-note { font-size: 10px; color: #34d399; margin-top: 2px; }
        .diff-note { font-size: 10px; color: #f59e0b; margin-top: 2px; }

        /* Stroke colors — distinct, visible on black */
        .sc0 { border-color: #ef4444; background: rgba(239,68,68,0.15); color: #ef4444; }
        .sc1 { border-color: #22d3ee; background: rgba(34,211,238,0.15); color: #22d3ee; }
        .sc2 { border-color: #a3e635; background: rgba(163,230,53,0.15); color: #a3e635; }
        .sc3 { border-color: #f59e0b; background: rgba(245,158,11,0.15); color: #f59e0b; }
        .sc4 { border-color: #c084fc; background: rgba(192,132,252,0.15); color: #c084fc; }
        .sc5 { border-color: #fb7185; background: rgba(251,113,133,0.15); color: #fb7185; }
        .sc0.off { background: transparent; } .sc1.off { background: transparent; }
        .sc2.off { background: transparent; } .sc3.off { background: transparent; }
        .sc4.off { background: transparent; } .sc5.off { background: transparent; }
    </style>
</head>
<body>
    <h1>Script Capital — Stroke Picker</h1>
    <div class="subtitle">Left = color-coded strokes (see what each does). Right = squiggle result. Click numbered buttons to toggle strokes on/off.</div>
    <div class="grid" id="grid"></div>

    <script src="../../squigword-engine.js"></script>
    <script>
    const RAW_HERSHEY = {
        'A': 'E\\XFVHTKQPOSLWIZG[E[DZDXEWFXEY RXFWJUTT[ RXFU[ RT[TYSVRTPRNQLQKRKTLWOZR[V[XZ',
        'B': 'F^UGTHSJQOOUNWLZJ[ RTHSKQSPVOXMZJ[H[GZGXHWIXHY ROLNNMOKOJNJLKJMHOGRFXFZG[I[KZMXNTORO RXFYGZIZKYMXN RTOWPXQYSYVXYWZU[S[RZRXSU RTOVPWQXSXVWYU[',
        'C': 'H]KHJJJLKNNOQOUNWMYKZIZGYFWFTGQJOMMQLULXMZP[R[UZWXXVXTWRURSSRU RWFUGRJPMNQMUMXNZP[',
        'D': 'F]UGTHSJQOOUNWLZJ[ RTHSKQSPVOXMZJ[H[GZGXHWJWLXNZP[S[UZWXYTZOZLYIWGUFPFMGKIJKJMKNMNNMOK',
        'E': 'I\\WIVJVLWMYMZKZIYGWFTFRGQHPJPLQNSO RTFRHQJQMSO RSOQONPLRKTKWLYMZO[R[UZWXXVXTWRURSSRU RQOOPMRLTLXMZ',
        'F': 'G\\WHVJTORUQWOZM[ RQLPNNOLOKMKKLINGQF[FXGWHVKTSSVRXPZM[K[IZHYHXIWJXIY RSFWGXG ROSPRRQVQXPZMXT',
        'G': 'G]JIIKIMJOLPOPROTNWKXHXGWFVFTGRIQKPNPQQSSTUTWSYQZO RWFUGSIRKQNQRST RZOYSWWUYSZO[L[JZIXIWJVKWJX RYSWVUXRZO[',
        'H': 'F^LLKKKILGOFRFOQMWLYKZI[G[FZFXGWHXGY RRFOONRLWKYI[ RJTKSMRVOXN[L]J^H^G]F\\FZGXJWLURTVTYV[W[YZ[X R\\FZHXLVRUVUYV[',
        'I': 'IYWHUKSPQUPWNZL[ RYLWNTOQOONNLNJOHQGUFYFWHVJTPRVQXOZL[J[IZIXJWKXJY',
        'J': 'IZYFWHUKSPPYN] RYMWOTPQPOONMNKOIQGUFYFWIVKSTQXPZN]M^K_J^J\\KZMXOWRVVU',
        'K': 'F^LLKKKIMGPFRFOQMWLYKZI[G[FZFXGWHXGY RRFOONRLWKYI[ RZGWKUMSNPO R]G\\H]I^H^G]F\\FZGWLVMTNPO RPOSPTRUYV[ RPORPSRTYV[W[YZ[X',
        'L': 'I[MILKLMMOOPRPUOWNZK[H[GZFYFWGVHTKPUOWMZK[ RVHTLRSQVPXNZK[I[HZHXIWKWMXPZR[U[WZYX',
        'M': 'D`RFNOKUIXGZE[C[BZBXCWDXCY RRFPMOQNVNZP[ RRFQJPOOVOZP[ R[FWORXP[ R[FYMXQWVWZY[Z[\\Z^X R[FZJYOXVXZY[',
        'N': 'G^RFQJOPMULWJZH[F[EZEXFWGXFY RRFRKSVT[ RRFSKTVT[ R`G_H`IaHaG`F^F\\GZJYLWQUWT[',
        'O': 'H]SFQGOIMLLNKRKVLYMZO[Q[TZVXXUYSZOZKYHXGWGUHSJQNPSPV RQGOJMNLRLVMYO[',
        'P': 'F]UGTHSJQOOUNWLZJ[ RTHSKQSPVOXMZJ[H[GZGXHWIXHY ROLNNMOKOJNJLKJMHOGRFVFYGZH[J[MZOYPVQTQRP RVFXGYHZJZMYOXPVQ',
        'Q': 'H]SFQGOIMLLNKRKVLYMZO[Q[TZVXXUYSZOZKYHXGWGUHSJQNPSPV RQGOJMNLRLVMYO[ RU[ZY',
        'R': 'F^UGTHSJQOOUNWLZJ[ RTHSKQSPVOXMZJ[H[GZGXHWIXHY ROLNNMOKOJNJLKJMHOGRFWFZG[I[KZMYNVORO RWFYGZIZKYMXNVO RROUPVRWYX[ RROTPURVYX[Y[[Z]X',
        'S': 'H\\H[JZLXOTQQSMTJTGSFRFQGPIPKQMSOVQXSYUYWXYWZT[P[MZKXJVJT',
        'T': 'I[YHXJVOTUSWQZO[ RSLRNPONOMMMKNIPGSF\\FZGYHXKVSUVTXRZO[M[KZJYJXKWLXKY RUFYGZG',
        'U': 'G]HJJGLFMFOHOKNNKVKYL[ RMFNHNKKSJVJYL[N[PZSWUTVR RZFVRUVUYW[X[ZZ\\X R[FWRVVVYW[',
        'V': 'G\\HJJGLFMFOHOKNOLVLYM[ RMFNHNKLRKVKYM[N[QZTWVTXPYMZIZGYFXFWGVIVLWNYP[Q]Q',
        'W': 'F]ILHLGKGIHGJFNFMHLLKUJ[ RLLLUK[ RVFTHRLOUMYK[ RVFUHTLSUR[ RTLTUS[ R`F^G\\IZLWUUYS[',
        'X': 'H\\PKOLMLLKLIMGOFQFSGTITLSPQUOXMZJ[H[GZGXHWIXHY RQFRGSISLRPPUNXLZJ[ R]G\\H]I^H^G]F[FYGWIULSPRURXSZT[U[WZYX',
        'Y': 'G]JJLGNFOFQGQIOOORPT ROFPGPINONRPTRTUSWQYNZL R\\FZLWTUX R]F[LYQWUUXSZP[L[JZIXIWJVKWJX',
        'Z': 'G\\ZHYJWOVRUTSWQYOZL[ RSLRNPONOMMMKNIPGSF]F[GZHYKXOVUTXQZL[H[GZGXHWJWLXOZQ[T[WZYX RVFZG[G'
    };

    const MANUAL_KEEP = {
        'A': [0, 1, 3], 'B': [1, 2, 4], 'C': [0], 'D': [1],
        'E': [0, 2], 'F': [1, 3], 'G': [0, 2], 'H': [0, 2],
        'I': [1], 'J': [1], 'K': [0, 3, 5],
        'M': [0, 2, 3, 4], 'N': [0, 1, 3], 'O': [0],
        'P': [1, 2], 'Q': [0, 2], 'R': [1, 2, 5],
        'T': [1], 'U': [0, 1, 2], 'V': [1],
        'W': [0, 2, 3, 5], 'X': [0, 2], 'Y': [0, 1, 3], 'Z': [1],
    };

    const STROKE_COLORS = ['#ef4444', '#22d3ee', '#a3e635', '#f59e0b', '#c084fc', '#fb7185'];
    const SEED = 42;
    const CW = 280, CH = 200; // canvas size

    const allOriginal = {};
    for (const [ch, raw] of Object.entries(RAW_HERSHEY)) {
        allOriginal[ch] = SquigWord.decodeHersheyFont(raw);
    }

    const grid = document.getElementById('grid');
    const letterPicks = {}; // letter -> Set of enabled stroke indices

    // Initialize picks: manual where available, all strokes otherwise
    for (const ch of 'ABCDEFGHIJKLMNOPQRSTUVWXYZ') {
        const total = allOriginal[ch].strokes.length;
        if (ch in MANUAL_KEEP) {
            letterPicks[ch] = new Set(MANUAL_KEEP[ch]);
        } else {
            letterPicks[ch] = new Set(Array.from({length: total}, (_, i) => i));
        }
    }

    function renderStrokeMap(ctx, letter) {
        const strokes = allOriginal[letter].strokes;
        const width = allOriginal[letter].width;

        // Compute bounds
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        for (const s of strokes) for (const [x, y] of s) {
            minX = Math.min(minX, x); maxX = Math.max(maxX, x);
            minY = Math.min(minY, y); maxY = Math.max(maxY, y);
        }
        const padX = (maxX - minX) * 0.1 || 20;
        const padY = (maxY - minY) * 0.1 || 20;
        const scaleX = CW / (maxX - minX + padX * 2);
        const scaleY = CH / (maxY - minY + padY * 2);
        const scale = Math.min(scaleX, scaleY);
        const offX = (CW - (maxX - minX) * scale) / 2 - minX * scale;
        const offY = (CH - (maxY - minY) * scale) / 2 - minY * scale;

        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, CW, CH);

        strokes.forEach((stroke, si) => {
            const enabled = letterPicks[letter].has(si);
            ctx.strokeStyle = STROKE_COLORS[si % STROKE_COLORS.length];
            ctx.globalAlpha = enabled ? 1.0 : 0.4;
            ctx.lineWidth = enabled ? 2.5 : 1.5;
            ctx.beginPath();
            stroke.forEach(([x, y], pi) => {
                const sx = x * scale + offX;
                const sy = CH - (y * scale + offY); // flip Y
                if (pi === 0) ctx.moveTo(sx, sy);
                else ctx.lineTo(sx, sy);
            });
            ctx.stroke();

            // Label stroke number at start
            const [x0, y0] = stroke[0];
            const lx = x0 * scale + offX;
            const ly = CH - (y0 * scale + offY);
            ctx.globalAlpha = enabled ? 0.9 : 0.5;
            ctx.fillStyle = STROKE_COLORS[si % STROKE_COLORS.length];
            ctx.font = 'bold 11px system-ui';
            ctx.fillText(si.toString(), lx + 3, ly - 3);
        });
        ctx.globalAlpha = 1;
    }

    // Letters with merged strokes — render using engine's merged data directly
    const MERGED_LETTERS = new Set(['L', 'U', 'V', 'Y']);

    function renderSquiggle(ctx, letter) {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, CW, CH);

        const glyph = SquigWord.FONTS.Script.glyphs[letter];

        if (MERGED_LETTERS.has(letter)) {
            // Use engine's merged strokes as-is
            const config = {
                seed: SEED, fontStyle: 'Script',
                rotation: 0, slant: 0,
                loopWidth: 1.0, loopHeight: 1.0,
                colorOffset: 0
            };
            const { particles } = SquigWord.computeDrawOps(letter, CW, CH, 'Normal', 20, config);
            SquigWord.drawParticles(ctx, particles);
        } else {
            const saved = glyph.strokes;
            const picked = [...letterPicks[letter]].sort((a, b) => a - b);
            glyph.strokes = picked.map(i => allOriginal[letter].strokes[i]).filter(Boolean);

            if (glyph.strokes.length > 0) {
                const config = {
                    seed: SEED, fontStyle: 'Script',
                    rotation: 0, slant: 0,
                    loopWidth: 1.0, loopHeight: 1.0,
                    colorOffset: 0
                };
                const { particles } = SquigWord.computeDrawOps(letter, CW, CH, 'Normal', 20, config);
                SquigWord.drawParticles(ctx, particles);
            }

            glyph.strokes = saved;
        }
    }

    function updateCell(letter) {
        const { mapCanvas, sqCanvas, label, buttons } = cells[letter];
        renderStrokeMap(mapCanvas.getContext('2d'), letter);
        renderSquiggle(sqCanvas.getContext('2d'), letter);

        const total = allOriginal[letter].strokes.length;
        const picked = [...letterPicks[letter]].sort((a, b) => a - b);
        const hasManual = letter in MANUAL_KEEP;
        const matchesManual = hasManual && JSON.stringify(picked) === JSON.stringify(MANUAL_KEEP[letter]);
        const isAll = picked.length === total;

        let status = '';
        if (MERGED_LETTERS.has(letter)) {
            status = '<span class="status" style="color:#60a5fa">MERGED 0+1</span>';
        } else if (hasManual && matchesManual) {
            status = '<span class="status status-done">current</span>';
        } else if (hasManual && !matchesManual) {
            status = '<span class="status diff-note">modified</span>';
        } else if (!hasManual && !isAll) {
            status = '<span class="status status-needs">NEW pick</span>';
        } else {
            status = '<span class="status" style="color:#555">all strokes</span>';
        }
        const pickDisplay = MERGED_LETTERS.has(letter) ? 'merged' : picked.join(', ');
        label.innerHTML = `${letter} ${status} <span class="pick-line">[<span class="indices">${pickDisplay}</span>]</span>`;

        // Update button states
        buttons.forEach((btn, i) => {
            btn.className = `stroke-btn sc${i} ${letterPicks[letter].has(i) ? 'on' : 'off'}`;
        });
    }

    const cells = {};

    'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(letter => {
        const strokes = allOriginal[letter].strokes;
        const total = strokes.length;

        const cell = document.createElement('div');
        cell.className = 'cell';

        const canvasWrap = document.createElement('div');
        canvasWrap.className = 'canvases';

        const mapCanvas = document.createElement('canvas');
        mapCanvas.width = CW; mapCanvas.height = CH;
        mapCanvas.title = 'Stroke map (colored paths)';
        canvasWrap.appendChild(mapCanvas);

        const sqCanvas = document.createElement('canvas');
        sqCanvas.width = CW; sqCanvas.height = CH;
        sqCanvas.title = 'Squiggle result';
        canvasWrap.appendChild(sqCanvas);

        cell.appendChild(canvasWrap);

        const info = document.createElement('div');
        info.className = 'info';

        const label = document.createElement('div');
        label.className = 'letter-head';
        info.appendChild(label);

        const toggles = document.createElement('div');
        toggles.className = 'stroke-toggles';
        const buttons = [];
        for (let i = 0; i < total; i++) {
            const btn = document.createElement('button');
            btn.textContent = i;
            btn.addEventListener('click', () => {
                if (letterPicks[letter].has(i)) {
                    if (letterPicks[letter].size > 1) letterPicks[letter].delete(i);
                } else {
                    letterPicks[letter].add(i);
                }
                updateCell(letter);
            });
            toggles.appendChild(btn);
            buttons.push(btn);
        }
        info.appendChild(toggles);

        cell.appendChild(info);
        grid.appendChild(cell);

        cells[letter] = { mapCanvas, sqCanvas, label, buttons, cell };
        updateCell(letter);
    });
    </script>
