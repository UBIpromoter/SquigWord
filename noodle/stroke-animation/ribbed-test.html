<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ribbed Approach Comparison</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --card: #161619;
            --input: #1e1e22;
            --text: #ffffff;
            --dim: #9ca3af;
            --muted: #6b7280;
            --accent: #a855f7;
            --glow: rgba(168, 85, 247, 0.2);
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
        }
        h1 { font-size: 14px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .controls {
            display: flex; gap: 12px; align-items: flex-end; margin-bottom: 16px;
            background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px;
        }
        .field-label { display: block; font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        input[type="number"] {
            background: var(--input); border: 1px solid var(--border); border-radius: 6px;
            padding: 10px 12px; font-size: 14px; font-family: 'JetBrains Mono', monospace;
            color: var(--text); outline: none; width: 100px; text-align: center;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
        .btn {
            padding: 10px 20px; border-radius: 6px; font-size: 13px; font-weight: 600;
            font-family: inherit; cursor: pointer; border: 1px solid var(--accent);
            background: var(--accent); color: white; transition: all 0.12s;
        }
        .btn:hover { filter: brightness(1.15); }
        .icon-btn {
            width: 38px; height: 38px; border-radius: 6px; border: 1px solid var(--border);
            background: var(--card); color: var(--muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 16px;
        }
        .icon-btn:hover { background: var(--glow); border-color: var(--accent); color: var(--text); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .cell {
            background: var(--card); border: 1px solid var(--border); border-radius: 10px;
            padding: 6px; position: relative;
        }
        .cell-label {
            position: absolute; top: 8px; left: 10px; z-index: 1;
            font-size: 10px; font-weight: 600; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.5px;
            background: rgba(0,0,0,0.7); padding: 3px 8px; border-radius: 4px;
        }
        .cell-label .val { color: var(--accent); font-family: 'JetBrains Mono', monospace; }
        .cell-info {
            position: absolute; bottom: 8px; left: 10px; z-index: 1;
            font-size: 10px; color: var(--dim);
            background: rgba(0,0,0,0.7); padding: 3px 8px; border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
        }
        canvas { width: 100%; aspect-ratio: 3/2; display: block; border-radius: 6px; }
    </style>
</head>
<body>
    <h1>Ribbed Approach Comparison</h1>
    <div class="controls">
        <div>
            <span class="field-label">Seed</span>
            <input type="number" id="seedInput" value="16975">
        </div>
        <button class="icon-btn" id="randomBtn">↻</button>
        <button class="btn" id="generateBtn">Generate</button>
        <div style="margin-left: auto; font-size: 12px; color: var(--dim); align-self: center;">
            Base div: <strong id="divDisplay" style="color: var(--text);">—</strong>
        </div>
    </div>
    <div class="grid">
        <div class="cell">
            <div class="cell-label">A — Original <span class="val">(baseline)</span></div>
            <div class="cell-info" id="infoA"></div>
            <canvas id="canvasA" width="900" height="600"></canvas>
        </div>
        <div class="cell">
            <div class="cell-label">B — Cap div at 10</div>
            <div class="cell-info" id="infoB"></div>
            <canvas id="canvasB" width="900" height="600"></canvas>
        </div>
        <div class="cell">
            <div class="cell-label">C — More steps <span class="val">(200 × div/5)</span></div>
            <div class="cell-info" id="infoC"></div>
            <canvas id="canvasC" width="900" height="600"></canvas>
        </div>
        <div class="cell">
            <div class="cell-label">D — More steps <span class="val">(200 × div/8)</span></div>
            <div class="cell-info" id="infoD"></div>
            <canvas id="canvasD" width="900" height="600"></canvas>
        </div>
    </div>

<script>
// === UTILITIES (same as main file) ===
function curvePoint(p0, p1, p2, p3, t) {
    const t2 = t * t, t3 = t2 * t;
    return 0.5 * ((2 * p1) + (-p0 + p2) * t + (2 * p0 - 5 * p1 + 4 * p2 - p3) * t2 + (-p0 + 3 * p1 - 3 * p2 + p3) * t3);
}
function hsbToRgb(h, s, b) {
    const hue = ((h % 255) + 255) % 255 / 255;
    const sat = s / 255, bri = b / 255;
    let r, g, bl;
    const i = Math.floor(hue * 6), f = hue * 6 - i;
    const p = bri * (1 - sat), q = bri * (1 - f * sat), tv = bri * (1 - (1 - f) * sat);
    switch (i % 6) {
        case 0: r = bri; g = tv; bl = p; break;
        case 1: r = q; g = bri; bl = p; break;
        case 2: r = p; g = bri; bl = tv; break;
        case 3: r = p; g = q; bl = bri; break;
        case 4: r = tv; g = p; bl = bri; break;
        case 5: r = bri; g = p; bl = q; break;
    }
    return [Math.round(r * 255), Math.round(g * 255), Math.round(bl * 255)];
}
function map(value, inMin, inMax, outMin, outMax) {
    return outMin + (outMax - outMin) * ((value - inMin) / (inMax - inMin));
}
function generateDecPairs(seed) {
    let s = (Math.abs(seed) ^ 0xDEADBEEF) >>> 0;
    const pairs = [];
    for (let i = 0; i < 32; i++) {
        s ^= s << 13; s ^= s >>> 17; s ^= s << 5; s = s >>> 0;
        pairs.push(s % 256);
    }
    return pairs;
}

// === RENDER ONE RIBBED SQUIGGLE ===
// approach: 'original' | 'capDiv' | 'moreStepsAggressive' | 'moreStepsMild'
function renderRibbed(canvasId, infoId, seed, approach) {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext('2d');
    const width = canvas.width, height = canvas.height;
    const decPairs = generateDecPairs(seed);

    const startColor = decPairs[29];
    const reverse = decPairs[30] < 128;
    const segments = Math.floor(map(decPairs[26], 0, 255, 12, 20));
    const ht = map(decPairs[27], 0, 255, 3, 4);
    const spread = 15;
    const wt = 2, amp = 1;
    const sw = height / 1200;

    // Base div from hash
    let div = Math.floor(map(Math.round(decPairs[24]), 0, 230, 3, 20));
    let steps = 200;

    // Apply approach
    switch (approach) {
        case 'capDiv':
            div = Math.min(div, 10);
            break;
        case 'moreStepsAggressive':
            // 200 × (div/5) — aggressive step increase
            steps = Math.round(200 * Math.max(1, div / 5));
            break;
        case 'moreStepsMild':
            // 200 × max(1, div/8) — mild step increase
            steps = Math.round(200 * Math.max(1, div / 8));
            break;
    }

    // Show info
    document.getElementById(infoId).textContent = `div=${div}  steps=${steps}`;

    // Background
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, width, height);
    ctx.lineWidth = sw;

    const offsetX = (width / 2) - (width / wt / 2);
    const offsetY = height / 2;
    let color = 0;

    for (let j = 0; j < segments - 2; j++) {
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const x = curvePoint(
                width / segments / wt * j,
                width / segments / wt * (j + 1),
                width / segments / wt * (j + 2),
                width / segments / wt * (j + 3),
                t
            ) + offsetX;
            const y = curvePoint(
                map(decPairs[j], 0, 255, -height / ht, height / ht) * amp,
                map(decPairs[j + 1], 0, 255, -height / ht, height / ht) * amp,
                map(decPairs[j + 2], 0, 255, -height / ht, height / ht) * amp,
                map(decPairs[j + 3], 0, 255, -height / ht, height / ht) * amp,
                t
            ) + offsetY;

            const hue = reverse
                ? 255 - (((color / spread) + startColor) % 255)
                : (((color / spread) + startColor) % 255);
            const [r, g, b] = hsbToRgb(hue, 255, 255);

            // Normal body (H/13)
            ctx.beginPath();
            ctx.arc(x, y, (height / 13) / 2, 0, Math.PI * 2);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fill();

            // Gray overlay at rib intervals (H/12)
            if (i % div === 0 || i === 0 || i === steps - 1) {
                ctx.beginPath();
                ctx.arc(x, y, (height / 12) / 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgb(${decPairs[25]},${decPairs[25]},${decPairs[25]})`;
                ctx.fill();
            }

            color++;
        }
    }
}

function generateAll() {
    const seed = parseInt(document.getElementById('seedInput').value) || 42;
    const decPairs = generateDecPairs(seed);
    const baseDiv = Math.floor(map(Math.round(decPairs[24]), 0, 230, 3, 20));
    document.getElementById('divDisplay').textContent = baseDiv;

    renderRibbed('canvasA', 'infoA', seed, 'original');
    renderRibbed('canvasB', 'infoB', seed, 'capDiv');
    renderRibbed('canvasC', 'infoC', seed, 'moreStepsAggressive');
    renderRibbed('canvasD', 'infoD', seed, 'moreStepsMild');
}

// Events
document.getElementById('generateBtn').addEventListener('click', generateAll);
document.getElementById('seedInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') generateAll();
});
document.getElementById('seedInput').addEventListener('focus', (e) => e.target.select());
document.getElementById('randomBtn').addEventListener('click', () => {
    document.getElementById('seedInput').value = Math.floor(Math.random() * 20000);
    generateAll();
});

// Initial render
generateAll();
</script>
</body>
</html>
