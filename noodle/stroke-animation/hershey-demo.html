<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hershey Script - Proper Stroke Order</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui;
            background: #0d0d0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
        }
        h1 { font-size: 20px; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
        }
        input[type="text"] {
            font-size: 24px;
            padding: 12px 20px;
            width: 320px;
            background: #1a1a1f;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            text-align: center;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background: #2a2a30;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            transition: all 0.15s;
        }
        button:hover { background: #3a3a40; }
        button.active { background: #7c3aed; border-color: #9333ea; }
        canvas {
            background: #000;
            border-radius: 12px;
        }
        .speed-control, .variation-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }
        .speed-control label, .variation-control label { color: #888; font-size: 14px; }
        .speed-control input[type="range"], .variation-control input[type="range"] {
            width: 150px;
        }
        .variation-control { margin-top: 8px; }
        .font-select {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }
        .font-select label { color: #888; font-size: 14px; }
        .font-btn {
            padding: 8px 16px;
            font-size: 14px;
            background: #1a1a2e;
            border: 1px solid #444;
        }
        .font-btn.active {
            background: #7c3aed;
            border-color: #9333ea;
        }
        .presets {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .preset-btn {
            padding: 10px 20px;
            font-size: 15px;
            background: #1a1a2e;
            border: 1px solid #7c3aed;
            color: #c4b5fd;
        }
        .preset-btn:hover {
            background: #7c3aed;
            color: #fff;
        }
        .info {
            margin-top: 20px;
            color: #666;
            font-size: 13px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Hershey Script Simplex</h1>
    <div class="subtitle">Original 1967 vector font - designed for pen plotters - correct stroke order</div>

    <div class="controls">
        <input type="text" id="textInput" value="Squiggles" spellcheck="false" placeholder="type here">
        <button id="animateBtn">Animate</button>
        <button id="resetBtn">Reset</button>
    </div>

    <div class="variation-control">
        <label>Variation:</label>
        <input type="range" id="variationSlider" min="0" max="20" value="5">
        <span id="variationLabel">5</span>
    </div>

    <canvas id="canvas" width="900" height="280"></canvas>

    <div class="speed-control">
        <label>Speed:</label>
        <input type="range" id="speedSlider" min="1" max="20" value="3">
        <span id="speedLabel">3</span>
    </div>


    <div class="presets">
        <button class="preset-btn" data-word="Squiggles">Squiggles</button>
        <button class="preset-btn" data-word="Hello">Hello</button>
        <button class="preset-btn" data-word="Magic">Magic</button>
        <button class="preset-btn" data-word="Quick">Quick</button>
    </div>

    <div class="info" id="info">Hershey Script - uppercase &amp; lowercase</div>

<script>

    'U': 'G]HJJGLFMFOHOKNNKVKYL[ RMFNHNKKSJVJYL[N[PZSWUTVR RZFVRUVUYW[X[ZZ\\X R[FWRVVVYW[',
    'V': 'G\\HJJGLFMFOHOKNOLVLYM[ RMFNHNKLRKVKYM[N[QZTWVTXPYMZIZGYFXFWGVIVLWNYP[Q]Q',
    'W': 'F]ILHLGKGIHGJFNFMHLLKUJ[ RLLLUK[ RVFTHRLOUMYK[ RVFUHTLSUR[ RTLTUS[ R`F^G\\IZLWUUYS[',
    'X': 'H\\PKOLMLLKLIMGOFQFSGTITLSPQUOXMZJ[H[GZGXHWIXHY RQFRGSISLRPPUNXLZJ[ R]G\\H]I^H^G]F[FYGWIULSPRURXSZT[U[WZYX',
    'Y': 'G]JJLGNFOFQGQIOOORPT ROFPGPINONRPTRTUSWQYNZL R\\FZLWTUX R]F[LYQWUUXSZP[L[JZIXIWJVKWJX',
    'Z': 'G\\ZHYJWOVRUTSWQYOZL[ RSLRNPONOMMMKNIPGSF]F[GZHYKXOVUTXQZL[H[GZGXHWJWLXOZQ[T[WZYX RVFZG[G'
};

let currentFontData = HERSHEY_RAW;

const R = 82; // ASCII 'R' is the origin

// Decode a Hershey glyph to strokes
function decodeGlyph(data) {
    const leftMargin = data.charCodeAt(0) - R;
    const rightMargin = data.charCodeAt(1) - R;

    const strokes = [];
    let currentStroke = [];

    let i = 2;
    while (i < data.length) {
        // Pen-up command
        if (data[i] === ' ' && data[i + 1] === 'R') {
            if (currentStroke.length > 0) {
                strokes.push(currentStroke);
                currentStroke = [];
            }
            i += 2;
            continue;
        }

        const x = data.charCodeAt(i) - R;
        const y = data.charCodeAt(i + 1) - R;
        currentStroke.push([x, y]);
        i += 2;
    }

    if (currentStroke.length > 0) {
        strokes.push(currentStroke);
    }

    return {
        left: leftMargin,
        right: rightMargin,
        width: rightMargin - leftMargin,
        strokes: strokes
    };
}

// Decode all letters
let FONT = {};

function buildFont(fontData) {
    const font = {};
    for (const [char, data] of Object.entries(fontData)) {
        if (data && data.length >= 2) {
            font[char] = decodeGlyph(data);
        }
    }
    return font;
}

FONT = buildFont(HERSHEY_RAW);

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let animating = false;
let animProgress = 0;
let animFrame = null;
let speed = 3;
let variation = 5;
let varSeed = 1;

// Seeded random for consistent variation
function seededRandom() {
    varSeed = (varSeed * 9301 + 49297) % 233280;
    return varSeed / 233280;
}

// Get variation parameters for a letter instance
function getLetterVariation(letterIndex) {
    // Use letter index as part of seed for consistency
    varSeed = 12345 + letterIndex * 777;

    const amount = variation / 100; // 0 to 0.1

    return {
        scale: 1 + (seededRandom() - 0.5) * amount * 0.5,      // size: 92-108% at max
        rotation: (seededRandom() - 0.5) * amount * 0.3,       // tilt: more noticeable
        offsetY: (seededRandom() - 0.5) * amount * 20,         // vertical shift
        slant: (seededRandom() - 0.5) * amount * 0.2,          // italic lean
        // Stroke-level variations
        lineWidth: 1 + (seededRandom() - 0.5) * amount * 1.0,  // thickness: 85-115% at max
        vertStretch: 1 + (seededRandom() - 0.5) * amount * 0.5, // tail length: 92-108%
        horizStretch: 1 + (seededRandom() - 0.5) * amount * 0.4 // width: 94-106%
    };
}

// Apply variation transform to a point
function transformPoint(x, y, centerX, centerY, v) {
    // Translate to origin
    let px = x - centerX;
    let py = y - centerY;

    // Apply horizontal/vertical stretch (makes tails longer/shorter, letters wider/narrower)
    px = px * v.horizStretch;
    py = py * v.vertStretch;

    // Apply slant (shear)
    px = px + py * v.slant;

    // Apply rotation
    const cos = Math.cos(v.rotation);
    const sin = Math.sin(v.rotation);
    const rx = px * cos - py * sin;
    const ry = px * sin + py * cos;

    // Apply scale
    const sx = rx * v.scale;
    const sy = ry * v.scale;

    // Translate back + offset
    return [
        sx + centerX,
        sy + centerY + v.offsetY
    ];
}

// Letters with secondary strokes (dots, crossbars) - index of secondary stroke(s)
const SECONDARY_STROKES = {
    'i': [0],      // first stroke is the dot
    'j': [0],      // first stroke is the dot
    't': [2],      // third stroke is crossbar
    'f': [1],      // second stroke is crossbar
    'I': [0],      // varies by font
    'T': [0],      // crossbar first in some fonts
};

// Check if a stroke is likely a dot (very short, few points)
function isDot(stroke) {
    if (stroke.length <= 2) return true;
    // Calculate total length
    let len = 0;
    for (let i = 0; i < stroke.length - 1; i++) {
        const dx = stroke[i+1][0] - stroke[i][0];
        const dy = stroke[i+1][1] - stroke[i][1];
        len += Math.sqrt(dx*dx + dy*dy);
    }
    return len < 3; // very short stroke
}

// Check if stroke is likely a crossbar (mostly horizontal, short)
function isCrossbar(stroke, glyph) {
    if (stroke.length < 2) return false;
    const dx = Math.abs(stroke[stroke.length-1][0] - stroke[0][0]);
    const dy = Math.abs(stroke[stroke.length-1][1] - stroke[0][1]);
    // Horizontal-ish and not too long
    return dx > dy * 2 && stroke.length <= 4;
}

// Build path for entire word - with endpoint-preserving variation
function buildWordPath(text) {
    const scale = 5;
    const baselineY = 180;
    const primaryStrokes = [];
    const secondaryStrokes = []; // dots, crossbars - drawn last

    let xOffset = 60;
    let letterIndex = 0;

    for (const char of text) {
        const glyph = FONT[char];
        if (!glyph) continue;

        if (char === ' ') {
            xOffset += glyph.width * scale;
            continue;
        }

        // Get unique variation for this letter instance
        const v = getLetterVariation(letterIndex);

        // Calculate letter center for rotation/scale
        const letterCenterX = xOffset + (glyph.width / 2) * scale;
        const letterCenterY = baselineY + 10 * scale * 0.8;

        // Separate primary and secondary strokes
        for (let si = 0; si < glyph.strokes.length; si++) {
            const stroke = glyph.strokes[si];
            const isSecondary = isDot(stroke) || isCrossbar(stroke, glyph);

            // Transform stroke with endpoint preservation for primary strokes
            const transformedStroke = stroke.map(([x, y], pointIndex) => {
                const baseX = xOffset + (x - glyph.left) * scale;
                const baseY = baselineY + y * scale * 0.8;

                if (isSecondary) {
                    // Secondary strokes (dots, crossbars) get full transform
                    return transformPoint(baseX, baseY, letterCenterX, letterCenterY, v);
                }

                // For primary strokes: blend transform based on position
                // First and last points stay closer to original, middle points get full variation
                const totalPoints = stroke.length;
                const distFromEnd = Math.min(pointIndex, totalPoints - 1 - pointIndex);
                const blendFactor = Math.min(1, distFromEnd / 3); // Ramp up over 3 points

                const transformed = transformPoint(baseX, baseY, letterCenterX, letterCenterY, v);

                // Blend between original and transformed based on position
                return [
                    baseX + (transformed[0] - baseX) * blendFactor,
                    baseY + (transformed[1] - baseY) * blendFactor
                ];
            });

            // Attach lineWidth to stroke for rendering
            transformedStroke.lineWidth = v.lineWidth;

            if (isSecondary) {
                secondaryStrokes.push(transformedStroke);
            } else {
                primaryStrokes.push(transformedStroke);
            }
        }

        xOffset += glyph.width * scale - 1;
        letterIndex++;
    }

    // Return primary strokes first, then secondary (dots/crossbars last)
    return [...primaryStrokes, ...secondaryStrokes];
}

// Calculate total length of all strokes
function getTotalLength(strokes) {
    let total = 0;
    for (const stroke of strokes) {
        for (let i = 0; i < stroke.length - 1; i++) {
            const dx = stroke[i+1][0] - stroke[i][0];
            const dy = stroke[i+1][1] - stroke[i][1];
            total += Math.sqrt(dx*dx + dy*dy);
        }
    }
    return total;
}

// Render with progress (0-1)
function render(progress = 1) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const text = document.getElementById('textInput').value;
    if (!text.trim()) {
        document.getElementById('info').textContent = 'Type something...';
        return;
    }

    const strokes = buildWordPath(text);
    if (strokes.length === 0) {
        document.getElementById('info').textContent = 'No valid characters';
        return;
    }

    const totalLength = getTotalLength(strokes);
    const drawLength = totalLength * progress;

    ctx.strokeStyle = '#fff';
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    let accumulated = 0;
    let done = false;
    const baseLineWidth = 2.5;

    for (const stroke of strokes) {
        if (done) break;
        if (stroke.length < 2) continue;

        // Apply per-letter line width variation
        ctx.lineWidth = baseLineWidth * (stroke.lineWidth || 1);

        ctx.beginPath();
        ctx.moveTo(stroke[0][0], stroke[0][1]);

        for (let i = 0; i < stroke.length - 1; i++) {
            const dx = stroke[i+1][0] - stroke[i][0];
            const dy = stroke[i+1][1] - stroke[i][1];
            const segLen = Math.sqrt(dx*dx + dy*dy);

            if (accumulated + segLen <= drawLength) {
                ctx.lineTo(stroke[i+1][0], stroke[i+1][1]);
                accumulated += segLen;
            } else {
                // Partial segment
                const remaining = drawLength - accumulated;
                const t = remaining / segLen;
                ctx.lineTo(
                    stroke[i][0] + dx * t,
                    stroke[i][1] + dy * t
                );
                done = true;
                break;
            }
        }
        ctx.stroke();
    }

    const percent = Math.round(progress * 100);
    const strokeCount = strokes.reduce((sum, s) => sum + s.length, 0);
    document.getElementById('info').textContent = `"${text}" | ${strokes.length} strokes | ${strokeCount} points | ${percent}%`;
}

// Animation
function animate() {
    if (!animating) return;

    animProgress += 0.005 * speed;

    if (animProgress >= 1) {
        animProgress = 1;
        animating = false;
        document.getElementById('animateBtn').textContent = 'Animate';
        document.getElementById('animateBtn').classList.remove('active');
    }

    render(animProgress);

    if (animating) {
        animFrame = requestAnimationFrame(animate);
    }
}

function startAnimation() {
    if (animating) {
        animating = false;
        cancelAnimationFrame(animFrame);
        document.getElementById('animateBtn').textContent = 'Animate';
        document.getElementById('animateBtn').classList.remove('active');
        return;
    }

    animProgress = 0;
    animating = true;
    document.getElementById('animateBtn').textContent = 'Stop';
    document.getElementById('animateBtn').classList.add('active');
    animate();
}

function reset() {
    animating = false;
    animProgress = 1;
    cancelAnimationFrame(animFrame);
    document.getElementById('animateBtn').textContent = 'Animate';
    document.getElementById('animateBtn').classList.remove('active');
    render(1);
}

// Event handlers
document.getElementById('animateBtn').addEventListener('click', startAnimation);
document.getElementById('resetBtn').addEventListener('click', reset);
document.getElementById('textInput').addEventListener('input', reset);
document.getElementById('speedSlider').addEventListener('input', (e) => {
    speed = parseInt(e.target.value);
    document.getElementById('speedLabel').textContent = speed;
});

document.getElementById('variationSlider').addEventListener('input', (e) => {
    variation = parseInt(e.target.value);
    document.getElementById('variationLabel').textContent = variation;
    render(animProgress);
});


// Preset word buttons
document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const word = btn.dataset.word;
        document.getElementById('textInput').value = word;
        // Stop any current animation and start fresh
        animating = false;
        cancelAnimationFrame(animFrame);
        animProgress = 0;
        animating = true;
        document.getElementById('animateBtn').textContent = 'Stop';
        document.getElementById('animateBtn').classList.add('active');
        animate();
    });
});

// Initial render
render(1);
</script>
