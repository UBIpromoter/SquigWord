<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SquigWord</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --card: #ffffff;
            --input: #f0f0f2;
            --text: #1a1a1a;
            --dim: #4b5563;
            --muted: #6b7280;
            --accent: #7c3aed;
            --glow: rgba(124, 58, 237, 0.15);
            --border: rgba(0, 0, 0, 0.08);
            --canvas-bg: #ffffff;
        }
        .dark-mode {
            --bg: #0d0d0f;
            --card: #161619;
            --input: #1e1e22;
            --text: #ffffff;
            --dim: #9ca3af;
            --muted: #6b7280;
            --accent: #a855f7;
            --glow: rgba(168, 85, 247, 0.2);
            --border: rgba(255, 255, 255, 0.08);
            --canvas-bg: #000000;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { overflow-x: hidden; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .app { max-width: 900px; width: 100%; margin: 0 auto; padding: 16px; display: flex; flex-direction: column; min-height: 100vh; }
        .canvas-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 8px; margin-bottom: 12px; position: relative; flex-shrink: 0; }
        canvas { width: 100%; display: block; border-radius: 8px; background: var(--canvas-bg); }
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; flex-shrink: 0; }
        .field { margin-bottom: 16px; }
        .field:last-child { margin-bottom: 0; }
        .field-label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .field-row { display: flex; gap: 16px; margin-bottom: 16px; }
        .flex-grow { flex: 1; min-width: 0; }
        .input-group { display: flex; gap: 8px; align-items: center; }
        input[type="text"], input[type="number"] { background: var(--input); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 18px; font-family: inherit; color: var(--text); outline: none; transition: border 0.15s; }
        input:focus { border-color: var(--accent); }
        input[type="text"] { flex: 1; min-width: 0; }
        input[type="number"] { width: 80px; font-family: 'JetBrains Mono', monospace; text-align: center; font-size: 14px; }
        .slider-group { display: flex; align-items: center; gap: 10px; }
        .slider-group label { font-size: 12px; color: var(--muted); min-width: 60px; }
        .slider-group input[type="range"] { flex: 1; height: 4px; -webkit-appearance: none; background: var(--border); border-radius: 2px; outline: none; }
        .slider-group input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--accent); border-radius: 50%; cursor: pointer; }
        .slider-group span { font-size: 12px; color: var(--dim); min-width: 24px; text-align: right; font-family: 'JetBrains Mono', monospace; }
        .btn-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .btn { padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; border: 1px solid var(--border); background: var(--input); color: var(--dim); transition: all 0.12s; white-space: nowrap; }
        .btn:hover { background: var(--bg); color: var(--text); }
        .btn.active { background: var(--accent); border-color: var(--accent); color: white; }
        .icon-btn { width: 42px; height: 42px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.15s; }
        .icon-btn:hover { background: var(--glow); border-color: var(--accent); color: var(--text); }
        .icon-btn.playing { background: var(--accent); color: white; }
        .action-row { display: flex; gap: 10px; align-items: center; padding-top: 16px; border-top: 1px solid var(--border); margin-top: 16px; }
        .action-row .spacer { flex: 1; }
        .presets { display: flex; gap: 8px; flex-wrap: wrap; }
        .preset { padding: 6px 12px; border-radius: 6px; font-size: 13px; background: var(--input); border: 1px solid var(--border); color: var(--dim); cursor: pointer; transition: all 0.12s; }
        .preset:hover { border-color: var(--accent); color: var(--text); }
        .footer { text-align: center; padding: 12px; font-size: 12px; color: var(--muted); margin-top: auto; }
    </style>
</head>
<body>
    <div class="app">
        <div class="canvas-wrap">
            <canvas id="canvas" width="880" height="280"></canvas>
        </div>
        <div class="panel">
            <div class="field-row">
                <div class="field flex-grow">
                    <label class="field-label">Text</label>
                    <input type="text" id="textInput" value="Squiggles" maxlength="20" spellcheck="false">
                </div>
            </div>
            <div class="field">
                <label class="field-label">Presets</label>
                <div class="presets">
                    <button class="preset" data-word="Squiggles">Squiggles</button>
                    <button class="preset" data-word="Hello">Hello</button>
                    <button class="preset" data-word="Magic">Magic</button>
                    <button class="preset" data-word="Quick">Quick</button>
                    <button class="preset" data-word="The Lazy Fox">The Lazy Fox</button>
                </div>
            </div>
            <div class="field">
                <div class="slider-group">
                    <label>Variation</label>
                    <input type="range" id="variationSlider" min="0" max="20" value="5">
                    <span id="variationLabel">5</span>
                </div>
            </div>
            <div class="field">
                <div class="slider-group">
                    <label>Speed</label>
                    <input type="range" id="speedSlider" min="1" max="20" value="5">
                    <span id="speedLabel">5</span>
                </div>
            </div>
            <div class="action-row">
                <button class="icon-btn" id="modeToggle" title="Toggle dark mode">☀</button>
                <button class="icon-btn" id="animateBtn" title="Animate">▶</button>
                <button class="icon-btn" id="resetBtn" title="Reset">↺</button>
                <div class="spacer"></div>
                <button class="icon-btn" id="downloadBtn" title="Download PNG">↓</button>
            </div>
        </div>
        <footer class="footer">SquigWord · stroke animation</footer>
    </div>

const R = 82;

function decodeGlyph(data) {
    const leftMargin = data.charCodeAt(0) - R;
    const rightMargin = data.charCodeAt(1) - R;
    const strokes = [];
    let currentStroke = [];
    let i = 2;
    while (i < data.length) {
        if (data[i] === ' ' && data[i + 1] === 'R') {
            if (currentStroke.length > 0) {
                strokes.push(currentStroke);
                currentStroke = [];
            }
            i += 2;
            continue;
        }
        const x = data.charCodeAt(i) - R;
        const y = data.charCodeAt(i + 1) - R;
        currentStroke.push([x, y]);
        i += 2;
    }
    if (currentStroke.length > 0) strokes.push(currentStroke);
    return { left: leftMargin, right: rightMargin, width: rightMargin - leftMargin, strokes };
}

let FONT = {};
for (const [char, data] of Object.entries(HERSHEY_RAW)) {
    if (data && data.length >= 2) {
        FONT[char] = decodeGlyph(data);
    }
}

// ===========================================
// STATE & ELEMENTS
// ===========================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let darkMode = false;
let animating = false;
let animProgress = 1;
let animFrame = null;
let speed = 5;
let variation = 5;
let varSeed = 1;

// ===========================================
// VARIATION SYSTEM
// ===========================================
function seededRandom() {
    varSeed = (varSeed * 9301 + 49297) % 233280;
    return varSeed / 233280;
}

function getLetterVariation(letterIndex) {
    varSeed = 12345 + letterIndex * 777;
    const amount = variation / 100;
    return {
        scale: 1 + (seededRandom() - 0.5) * amount * 0.5,
        rotation: (seededRandom() - 0.5) * amount * 0.3,
        offsetY: (seededRandom() - 0.5) * amount * 20,
        slant: (seededRandom() - 0.5) * amount * 0.2,
        lineWidth: 1 + (seededRandom() - 0.5) * amount * 1.0,
        vertStretch: 1 + (seededRandom() - 0.5) * amount * 0.5,
        horizStretch: 1 + (seededRandom() - 0.5) * amount * 0.4
    };
}

function transformPoint(x, y, centerX, centerY, v) {
    let px = x - centerX;
    let py = y - centerY;
    px = px * v.horizStretch;
    py = py * v.vertStretch;
    px = px + py * v.slant;
    const cos = Math.cos(v.rotation);
    const sin = Math.sin(v.rotation);
    const rx = px * cos - py * sin;
    const ry = px * sin + py * cos;
    const sx = rx * v.scale;
    const sy = ry * v.scale;
    return [sx + centerX, sy + centerY + v.offsetY];
}

function isDot(stroke) {
    if (stroke.length <= 2) return true;
    let len = 0;
    for (let i = 0; i < stroke.length - 1; i++) {
        const dx = stroke[i+1][0] - stroke[i][0];
        const dy = stroke[i+1][1] - stroke[i][1];
        len += Math.sqrt(dx*dx + dy*dy);
    }
    return len < 3;
}

function isCrossbar(stroke) {
    if (stroke.length < 2) return false;
    const dx = Math.abs(stroke[stroke.length-1][0] - stroke[0][0]);
    const dy = Math.abs(stroke[stroke.length-1][1] - stroke[0][1]);
    return dx > dy * 2 && stroke.length <= 4;
}

// ===========================================
// BUILD WORD PATH
// ===========================================
function buildWordPath(text) {
    const scale = 5;
    const baselineY = 180;
    const primaryStrokes = [];
    const secondaryStrokes = [];

    let xOffset = 60;
    let letterIndex = 0;

    for (const char of text) {
        const glyph = FONT[char];
        if (!glyph) continue;

        if (char === ' ') {
            xOffset += glyph.width * scale;
            continue;
        }

        const v = getLetterVariation(letterIndex);
        const letterCenterX = xOffset + (glyph.width / 2) * scale;
        const letterCenterY = baselineY + 10 * scale * 0.8;

        for (let si = 0; si < glyph.strokes.length; si++) {
            const stroke = glyph.strokes[si];
            const isSecondary = isDot(stroke) || isCrossbar(stroke);

            const transformedStroke = stroke.map(([x, y], pointIndex) => {
                const baseX = xOffset + (x - glyph.left) * scale;
                const baseY = baselineY + y * scale * 0.8;

                if (isSecondary) {
                    return transformPoint(baseX, baseY, letterCenterX, letterCenterY, v);
                }

                const totalPoints = stroke.length;
                const distFromEnd = Math.min(pointIndex, totalPoints - 1 - pointIndex);
                const blendFactor = Math.min(1, distFromEnd / 3);

                const transformed = transformPoint(baseX, baseY, letterCenterX, letterCenterY, v);
                return [
                    baseX + (transformed[0] - baseX) * blendFactor,
                    baseY + (transformed[1] - baseY) * blendFactor
                ];
            });

            transformedStroke.lineWidth = v.lineWidth;

            if (isSecondary) {
                secondaryStrokes.push(transformedStroke);
            } else {
                primaryStrokes.push(transformedStroke);
            }
        }

        xOffset += glyph.width * scale - 1;
        letterIndex++;
    }

    return [...primaryStrokes, ...secondaryStrokes];
}

function getTotalLength(strokes) {
    let total = 0;
    for (const stroke of strokes) {
        for (let i = 0; i < stroke.length - 1; i++) {
            const dx = stroke[i+1][0] - stroke[i][0];
            const dy = stroke[i+1][1] - stroke[i][1];
            total += Math.sqrt(dx*dx + dy*dy);
        }
    }
    return total;
}

// ===========================================
// RENDER
// ===========================================
function render(progress = 1) {
    ctx.fillStyle = darkMode ? '#000' : '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const text = document.getElementById('textInput').value;
    if (!text.trim()) return;

    const strokes = buildWordPath(text);
    if (strokes.length === 0) return;

    const totalLength = getTotalLength(strokes);
    const drawLength = totalLength * progress;

    ctx.strokeStyle = darkMode ? '#fff' : '#1a1a1a';
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    let accumulated = 0;
    let done = false;
    const baseLineWidth = 2.5;

    for (const stroke of strokes) {
        if (done) break;
        if (stroke.length < 2) continue;

        ctx.lineWidth = baseLineWidth * (stroke.lineWidth || 1);
        ctx.beginPath();
        ctx.moveTo(stroke[0][0], stroke[0][1]);

        for (let i = 0; i < stroke.length - 1; i++) {
            const dx = stroke[i+1][0] - stroke[i][0];
            const dy = stroke[i+1][1] - stroke[i][1];
            const segLen = Math.sqrt(dx*dx + dy*dy);

            if (accumulated + segLen <= drawLength) {
                ctx.lineTo(stroke[i+1][0], stroke[i+1][1]);
                accumulated += segLen;
            } else {
                const remaining = drawLength - accumulated;
                const t = remaining / segLen;
                ctx.lineTo(stroke[i][0] + dx * t, stroke[i][1] + dy * t);
                done = true;
                break;
            }
        }
        ctx.stroke();
    }
}

// ===========================================
// ANIMATION
// ===========================================
function animate() {
    if (!animating) return;
    animProgress += 0.003 * speed;
    if (animProgress >= 1) {
        animProgress = 1;
        animating = false;
        document.getElementById('animateBtn').textContent = '▶';
        document.getElementById('animateBtn').classList.remove('playing');
    }
    render(animProgress);
    if (animating) animFrame = requestAnimationFrame(animate);
}

function startAnimation() {
    if (animating) {
        animating = false;
        cancelAnimationFrame(animFrame);
        document.getElementById('animateBtn').textContent = '▶';
        document.getElementById('animateBtn').classList.remove('playing');
        return;
    }
    animProgress = 0;
    animating = true;
    document.getElementById('animateBtn').textContent = '⏸';
    document.getElementById('animateBtn').classList.add('playing');
    animate();
}

function reset() {
    animating = false;
    animProgress = 1;
    cancelAnimationFrame(animFrame);
    document.getElementById('animateBtn').textContent = '▶';
    document.getElementById('animateBtn').classList.remove('playing');
    render(1);
}

// ===========================================
// EVENT HANDLERS
// ===========================================
document.getElementById('animateBtn').addEventListener('click', startAnimation);
document.getElementById('resetBtn').addEventListener('click', reset);
document.getElementById('textInput').addEventListener('input', reset);

document.getElementById('speedSlider').addEventListener('input', (e) => {
    speed = parseInt(e.target.value);
    document.getElementById('speedLabel').textContent = speed;
});

document.getElementById('variationSlider').addEventListener('input', (e) => {
    variation = parseInt(e.target.value);
    document.getElementById('variationLabel').textContent = variation;
    render(animProgress);
});

document.getElementById('modeToggle').addEventListener('click', () => {
    darkMode = !darkMode;
    document.body.classList.toggle('dark-mode', darkMode);
    document.getElementById('modeToggle').textContent = darkMode ? '☀' : '☾';
    render(animProgress);
});

document.querySelectorAll('.preset').forEach(btn => {
    btn.addEventListener('click', () => {
        document.getElementById('textInput').value = btn.dataset.word;
        reset();
    });
});

document.getElementById('downloadBtn').addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'squigword.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
});

// Initial render
render(1);
</script>
</body>
</html>
